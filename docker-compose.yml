services:

  mongodb:
    image: mongo

    container_name: campus-db

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  backend:
    build: ./server

    container_name: campus-backend

    ports:
      - "5000:5000"

    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/campusconnect
      JWT_SECRET: campus_secret

    depends_on:
      - mongodb

  frontend:
    build: ./client

    container_name: campus-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  mongo-data: